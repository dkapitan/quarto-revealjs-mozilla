title: "quarto-revealjs-mozilla"
author: "Daniel Kapitan"
version: "1.1.0"
quarto-required: ">=1.4.0"
contributes:
  shortcodes:
    - source.lua
  formats:
    revealjs:
      filters:
        - logo.lua
        - heading-rule.lua
      theme: [mozilla.scss, brand]
      width: 1280
      height: 720
      margin: 0.05
      transition: fade
      background-transition: fade
      slide-number: true
      center: false
      center-title-slide: false
      template-partials:
        - title-slide.html
      auto-stretch: true
      controls: true
      progress: true
      hash: true
      preview-links: auto
